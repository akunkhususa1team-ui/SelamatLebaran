<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Lebaran Bersama Aili 🌙</title>
    <style>
        :root{ --green:#1b5e20; --gold:#ffd700; --dark:#0a260a; --card:rgba(255,255,255,.12); }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;font-family:"Segoe UI",Arial,sans-serif; overflow:hidden;}
        body{ background:radial-gradient(circle at top, #1b5e20, var(--dark)); display:flex; flex-direction:column; color:white; }

        #opening{ position:fixed; inset:0; background:rgba(0,0,0,.95); backdrop-filter:blur(20px); display:grid; place-items:center; font-size:24px; cursor:pointer; z-index:9999; transition:0.8s; color: var(--gold); text-align:center; padding:20px; }
        .fade-out{opacity:0; pointer-events:none}
        #bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 400; }

        .container{ flex:1; display:flex; align-items:center; justify-content:center; padding:15px; z-index:10; }
        .card{ 
            width:100%; max-width:380px; background:var(--card); backdrop-filter:blur(15px); 
            border-radius:30px; padding:25px 20px; text-align:center; 
            box-shadow:0 20px 50px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);
            position: relative; z-index: 100;
        }

        .photo-wrapper { width: 140px; height: 140px; margin: 0 auto 15px; position: relative; z-index: 110; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .photo { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; box-shadow: 0 0 20px var(--gold); border: 2px solid var(--gold); cursor: pointer; }
        .is-portrait { width: 280px !important; height: 380px !important; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; }

        .info-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .buttons { position: relative; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        #yesBtn { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        #noBtn { background: #444; color: white; position: relative; }
        
        .dana-btn { 
            background: #118eea; color: white; display: none; margin-top: 20px; text-decoration: none; 
            padding: 15px; border-radius: 15px; font-weight: bold; animation: pulse 1.5s infinite; text-align: center;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .falling-item { position: fixed; top: -50px; animation: fall linear infinite; z-index: 1; opacity: 0.7; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .running { background: var(--green); padding: 12px 0; overflow: hidden; white-space: nowrap; border-top: 2px solid var(--gold); position: relative; z-index: 1000; }
        .running span { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; font-weight: bold; color: var(--gold); }
        @keyframes scroll { to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="opening">🌙 Klik untuk Aili 🌙<br><small style="font-size: 14px;">Klik di mana saja untuk mulai</small></div>
    <div id="bg-overlay"></div>

    <div class="container">
        <div class="card">
            <h1 style="color: var(--gold); font-size: 20px; margin-bottom: 10px;">Selamat Lebaran Aili ✨</h1>
            <div class="photo-wrapper" id="pWrapper">
                <img src="halo/foto.jpg" class="photo" id="mainPhoto" alt="Aili" onerror="this.src='https://via.placeholder.com/150?text=Foto+Tidak+Ada'">
            </div>

            <div id="content-awal">
                <div class="info-box">
                    <p>🕌 Maaf Lahir & Batin ya!</p>
                    <p>📅 Sampai ketemu di hari raya!</p>
                </div>
                <p style="margin: 10px 0;">Boleh aku mampir ke rumahmu? 🥺</p>
                <div class="buttons">
                    <button id="yesBtn">Boleh! 🙏</button>
                    <button id="noBtn">Nggak 😜</button>
                </div>
            </div>
