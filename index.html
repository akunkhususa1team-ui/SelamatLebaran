<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Lebaran Bersama Aili 🌙</title>
    <style>
        :root{ --green:#1b5e20; --gold:#ffd700; --dark:#0a260a; --card:rgba(255,255,255,.12); }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;font-family:"Segoe UI",Arial,sans-serif; overflow:hidden;}
        body{ background:radial-gradient(circle at top, #1b5e20, var(--dark)); display:flex; flex-direction:column; color:white; transition: 0.5s; }

        #opening{ position:fixed; inset:0; background:rgba(0,0,0,.9); backdrop-filter:blur(20px); display:grid; place-items:center; font-size:24px; cursor:pointer; z-index:9999; transition:0.8s; color: var(--gold); text-align:center; padding:20px; }
        .fade-out{opacity:0; pointer-events:none}

        .container{ flex:1; display:flex; align-items:center; justify-content:center; padding:15px; z-index:10; }
        .card{ 
            width:100%; max-width:380px; background:var(--card); backdrop-filter:blur(15px); 
            border-radius:30px; padding:25px 20px; text-align:center; 
            box-shadow:0 20px 50px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);
            position: relative; z-index: 100;
        }

        .photo-wrapper { width: 180px; height: 180px; margin: 0 auto; position: relative; z-index: 110; transition: 0.6s; }
        .photo { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; box-shadow: 0 0 25px var(--gold); border: 2px solid var(--gold); }
        .is-portrait { width: 240px !important; height: 320px !important; }

        .info-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .info-item { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }

        .buttons { position: relative; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        #yesBtn { background: var(--gold); color: #120012; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); z-index: 1000; }
        #noBtn { background: #444; color: white; z-index: 999; }

        /* Animasi Ketupat */
        .ketupat-bg { position: fixed; top: -50px; font-size: 30px; animation: fall linear infinite; z-index: 1; opacity: 0.5; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .running { background: var(--green); padding: 12px 0; overflow: hidden; white-space: nowrap; border-top: 2px solid var(--gold); }
        .running span { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; font-weight: bold; color: var(--gold); }
        @keyframes scroll { to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="opening">🌙 Klik untuk Aili 🌙<br><small style="font-size: 14px; opacity: 0.7;">(Nyalakan Volume)</small></div>

    <div id="app-wrapper" style="display: contents;">
        <div class="container">
            <div class="card">
                <h1 style="color: var(--gold); margin-bottom: 15px;">Selamat Lebaran Aili ✨</h1>
                <div class="photo-wrapper" id="pWrapper">
                    <img src="foto.jpg" class="photo" id="mainPhoto" alt="Foto Aili">
                </div>

                <div class="info-box">
                    <div class="info-item">🕌 <span><b>Agenda:</b> Silaturahmi</span></div>
                    <div class="info-item">📅 <span><b>Waktu:</b> Idul Fitri</span></div>
                    <div class="info-item">🌙 <span><b>Pesan:</b> Maaf Lahir Batin ya!</span></div>
                </div>

                <h2 style="font-size: 18px; margin: 15px 0;">Boleh aku mampir ke rumahmu? 🥺</h2>
                <div class="buttons">
                    <button id="yesBtn">Boleh! 🙏</button>
                    <button id="noBtn">Nggak 😜</button>
                </div>
            </div>
        </div>
        <div class="running"><span>🌙 Minal Aidin Wal Faizin 🌙 Mohon Maaf Lahir dan Batin Aili 🌙 Ditunggu opor ayamnya! 🌙</span></div>
    </div>

    <audio id="mainAudio" src="lagu_lebaran.mp3" loop></audio>

<script>
    const opening = document.getElementById("opening");
    const mainAudio = document.getElementById("mainAudio");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    // Fungsi Ketupat Melayang
    function createKetupat() {
        const k = document.createElement("div");
        k.className = "ketupat-bg";
        k.innerHTML = "🫔"; // Emoji ketupat/makanan
        k.style.left = Math.random() * 100 + "vw";
        k.style.animationDuration = (Math.random() * 3 + 5) + "s";
        document.body.appendChild(k);
        setTimeout(() => k.remove(), 8000);
    }
    setInterval(createKetupat, 500);

    opening.onclick = () => {
        opening.classList.add("fade-out");
        mainAudio.play().catch(e => console.log("Audio gagal putar:", e));
    };

    // Fitur tombol No lari
    noBtn.onmouseover = () => {
        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * 80 + "%";
        noBtn.style.top = Math.random() * 80 + "%";
    };

    yesBtn.onclick = () => {
        alert("Alhamdulillah! Siapkan ketupatnya ya, Aili! ✨");
    };
</script>
</body>
</html>
