<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Lebaran Bersama Aili 🌙</title>
    <style>
        :root{ --green:#1b5e20; --gold:#ffd700; --dark:#0a260a; --card:rgba(255,255,255,.12); }
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;font-family:"Segoe UI",Arial,sans-serif; overflow:hidden;}
        body{ background:radial-gradient(circle at top, #1b5e20, var(--dark)); display:flex; flex-direction:column; color:white; }

        #opening{ position:fixed; inset:0; background:rgba(0,0,0,.9); backdrop-filter:blur(20px); display:grid; place-items:center; font-size:24px; cursor:pointer; z-index:9999; transition:0.8s; color: var(--gold); }
        .fade-out{opacity:0; pointer-events:none}

        .container{ flex:1; display:flex; align-items:center; justify-content:center; padding:15px; z-index:10; }
        .card{ 
            width:100%; max-width:380px; background:var(--card); backdrop-filter:blur(15px); 
            border-radius:30px; padding:25px 20px; text-align:center; 
            box-shadow:0 20px 50px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);
            position: relative; z-index: 100;
        }

        .photo-wrapper { width: 150px; height: 150px; margin: 0 auto; position: relative; z-index: 110; transition: 0.5s; }
        .photo { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; box-shadow: 0 0 20px var(--gold); border: 2px solid var(--gold); cursor: pointer; }
        /* Supaya saat foto diklik (zoom) tidak menutupi teks bawah secara permanen */
        .is-portrait { width: 250px !important; height: 330px !important; z-index: 500; }

        .info-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .info-item { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }

        .buttons { position: relative; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 100; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }
        #yesBtn { background: var(--gold); color: black; }
        #noBtn { background: #444; color: white; transition: 0.2s; }

        /* Animasi Ketupat */
        .ketupat { position: fixed; top: -50px; font-size: 30px; animation: fall linear infinite; z-index: 1; opacity: 0.6; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* Teks Berjalan di Paling Bawah */
        .running { background: var(--green); padding: 12px 0; overflow: hidden; white-space: nowrap; border-top: 2px solid var(--gold); position: relative; z-index: 1000; }
        .running span { display: inline-block; padding-left: 100%; animation: scroll 20s linear infinite; font-weight: bold; color: var(--gold); }
        @keyframes scroll { to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="opening">🌙 Klik untuk Aili 🌙</div>

    <div class="container">
        <div class="card">
            <h1 style="color: var(--gold); font-size: 22px;">Selamat Lebaran Aili ✨</h1>
            <div class="photo-wrapper" id="pWrapper">
                <img src="halo/foto.jpg" class="photo" id="mainPhoto" alt="Foto">
            </div>

            <div class="info-box">
                <div class="info-item">🕌 <span>Agenda: Maaf-maafan</span></div>
                <div class="info-item">📅 <span>Waktu: Hari Raya</span></div>
            </div>

            <p style="margin-bottom: 10px;">Boleh aku mampir? 🥺</p>
            <div class="buttons">
                <button id="yesBtn">Boleh! 🙏</button>
                <button id="noBtn">Nggak 😜</button>
            </div>
        </div>
    </div>

    <div class="running">
        <span>🌙 Minal Aidin Wal Faizin Aili 🌙 Mohon Maaf Lahir dan Batin 🌙 Ditunggu Opor Ayamnya! 🌙</span>
    </div>

    <audio id="mainAudio" src="lagu.mp3" loop></audio>

<script>
    const photo = document.getElementById("mainPhoto");
    const pWrapper = document.getElementById("pWrapper");
    const opening = document.getElementById("opening");
    const mainAudio = document.getElementById("mainAudio");
    const noBtn = document.getElementById("noBtn");

    // Zoom Foto
    photo.onclick = () => pWrapper.classList.toggle("is-portrait");

    // Mulai Musik
    opening.onclick = () => {
        opening.classList.add("fade-out");
        mainAudio.play();
    };

    // Tombol No Lari
    noBtn.onmouseover = () => {
        noBtn.style.position = "fixed";
        noBtn.style.left = Math.random() * 80 + "vw";
        noBtn.style.top = Math.random() * 80 + "vh";
    };

    // Fungsi Ketupat Melayang
    function createKetupat() {
        const k = document.createElement("div");
        k.className = "ketupat";
        k.innerHTML = "🫔"; // Kamu bisa ganti emoji ketupat di sini
        k.style.left = Math.random() * 100 + "vw";
        k.style.animationDuration = (Math.random() * 3 + 4) + "s";
        document.body.appendChild(k);
        setTimeout(() => k.remove(), 7000);
    }
    setInterval(createKetupat, 600);
</script>
</body>
</html>
